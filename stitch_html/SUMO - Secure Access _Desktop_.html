        @layer utilities {
            .material-symbols-outlined {
                font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-background text-on-surface font-body-md min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Minimalist Ambient Background -->
<div class="absolute inset-0 pointer-events-none">
<div class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[40%] h-[40%] bg-secondary/5 rounded-full blur-[100px]"></div>
</div>
<!-- Main Container -->
<main class="w-full max-w-[480px] px-margin-mobile md:px-margin-desktop z-10">
<!-- Login Card -->
<div class="bg-surface-container rounded-2xl p-8 md:p-10 shadow-lg border border-surface-container-high hover:bg-surface-variant transition-colors duration-300">
<!-- Branding -->
<div class="text-center mb-10">
<img src="https://lh3.googleusercontent.com/aida/AP1WRLv06YBhyEE8ethG4TEs_N77vFMWf20L0RBpuCxq4ffEVmStqbKWxvaK-Fp-mhHGNoJew2L-HNNJMKMTJrdFw4AwWAiFFucOUgTtAyX9DWAUPAtvllyH3bjt8ZJ669WS10QAEx_k5KuyDzaIYEhGSoUxwpKe0dcym0ADHVfcLzmMga2NLRaupEKs_nPxLl_MGjfTxb2lbQt4TwYi9RnVBKC1o8bOpA59s_-yiSqIr9mRAEArb_pEMWzamas" alt="SUMO Logo" class="h-16 w-auto mx-auto mb-4">
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Clinical Assessment Platform</p>
</div>
<!-- Form -->
<form action="#" class="space-y-6" method="POST">
<!-- Email Input -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant block" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">mail</span>
<input class="w-full bg-surface-container-highest border border-outline-variant rounded-lg py-3 pl-10 pr-4 text-text-primary font-body-md placeholder-on-surface-variant/50 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors" id="email" name="email" placeholder="provider@hospital.org" required="" type="email">
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center block">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:text-primary-fixed transition-colors" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">lock</span>
<input class="w-full bg-surface-container-highest border border-outline-variant rounded-lg py-3 pl-10 pr-4 text-text-primary font-body-md placeholder-on-surface-variant/50 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password">
</div>
</div>
<!-- Actions -->
<div class="pt-4">
<button class="w-full bg-primary text-on-primary font-label-md text-label-md rounded-full py-4 px-6 hover:bg-primary-fixed transition-colors flex items-center justify-center gap-2" type="submit">
<span class="">Authenticate</span>
<span class="material-symbols-outlined" style="font-size: 18px;">arrow_forward</span>
</button>
</div>
</form>
<!-- Divider -->
<div class="flex items-center my-8">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="px-4 font-label-caps text-label-caps text-on-surface-variant">OR</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Secondary Actions -->
<div class="text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant mb-4">Need platform access?</p>
<a class="inline-flex items-center justify-center bg-transparent border border-outline text-primary font-label-md text-label-md rounded-full py-3 px-6 hover:bg-surface-container-high transition-colors" href="#">
                    Request Credentials
                </a>
</div>
<div class="mt-8 p-4 bg-primary/5 border border-primary/20 rounded-lg flex gap-3 items-start">
    <span class="material-symbols-outlined text-primary" style="font-size: 20px;">info</span>
    <p class="text-body-sm font-body-sm text-on-surface-variant">
        This platform uses AI for preliminary guidance. AI-generated insights may be inaccurate; always verify with clinical documentation.
    </p>
</div></div>
<!-- Security Badge -->
<div class="mt-8 flex items-center justify-center gap-2 text-on-surface-variant opacity-60">
<span class="material-symbols-outlined" style="font-size: 16px;">encrypted</span>
<span class="font-label-caps text-label-caps">HIPAA COMPLIANT SECURE LOGIN</span>
</div>
</main>


</body></html>
