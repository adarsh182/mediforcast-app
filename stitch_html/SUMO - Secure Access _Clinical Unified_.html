<body class="bg-background text-on-surface font-body-md min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Minimalist Ambient Background -->
<div class="absolute inset-0 pointer-events-none">
<div class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[40%] h-[40%] bg-secondary/10 rounded-full blur-[100px]"></div>
</div>
<!-- Main Container -->
<main class="w-full max-w-[480px] px-margin-mobile md:px-margin-desktop z-10">
<!-- Login Card -->
<div class="bg-surface-container rounded-[1.25rem] p-8 md:p-10 shadow-lg border border-border-muted hover:bg-surface-variant/30 transition-colors duration-300">
<!-- Branding -->
<div class="text-center mb-10 flex flex-col items-center justify-center">
<img alt="SUMO Logo" class="h-16 w-auto mx-auto mb-2 text-primary" src="https://lh3.googleusercontent.com/aida/AP1WRLv06YBhyEE8ethG4TEs_N77vFMWf20L0RBpuCxq4ffEVmStqbKWxvaK-Fp-mhHGNoJew2L-HNNJMKMTJrdFw4AwWAiFFucOUgTtAyX9DWAUPAtvllyH3bjt8ZJ669WS10QAEx_k5KuyDzaIYEhGSoUxwpKe0dcym0ADHVfcLzmMga2NLRaupEKs_nPxLl_MGjfTxb2lbQt4TwYi9RnVBKC1o8bOpA59s_-yiSqIr9mRAEArb_pEMWzamas"/>
<h1 class="font-headline-md text-headline-md text-text-primary tracking-tight">SUMO</h1>
<p class="font-body-md text-body-md text-text-secondary mt-1">Clinical Assessment Platform</p>
</div>
<!-- Form -->
<form action="#" class="space-y-6" method="POST">
<!-- Email Input -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-text-secondary block" for="email">Email Address</label>
<div class="relative">
<i class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-text-secondary" data-lucide="mail"></i>
<input class="w-full bg-surface-container border border-border-muted rounded-2xl py-4 pl-12 pr-4 text-text-primary font-body-md placeholder-text-secondary/50 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors" id="email" name="email" placeholder="provider@hospital.org" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center block">
<label class="font-label-md text-label-md text-text-secondary" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:text-primary-fixed transition-colors" href="#">Forgot?</a>
</div>
<div class="relative">
<i class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-text-secondary" data-lucide="lock"></i>
<input class="w-full bg-surface-container border border-border-muted rounded-2xl py-4 pl-12 pr-4 text-text-primary font-body-md placeholder-text-secondary/50 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Actions -->
<div class="pt-4">
<button class="w-full bg-primary hover:bg-primary-fixed text-on-primary font-label-md text-[16px] rounded-full py-4 px-6 shadow-[0_0_15px_rgba(219,226,255,0.15)] transition-all flex items-center justify-center gap-2 font-medium" type="submit">
<span class="">Authenticate</span>
<i class="w-5 h-5" data-lucide="arrow-right"></i>
</button>
</div>
</form>
<!-- Divider -->
<div class="flex items-center my-8">
<div class="flex-grow border-t border-border-muted"></div>
<span class="px-4 font-label-caps text-label-caps text-text-secondary">OR</span>
<div class="flex-grow border-t border-border-muted"></div>
</div>
<!-- Secondary Actions -->
<div class="text-center">
<p class="font-body-sm text-body-sm text-text-secondary mb-4">Need platform access?</p>
<button class="inline-flex w-full items-center justify-center bg-transparent border border-border-muted text-text-primary font-label-md text-[14px] rounded-full py-4 px-6 hover:bg-surface-variant transition-colors" href="#">
                    Request Credentials
                </button>
</div>
<div class="mt-8 p-4 bg-surface-container border border-border-muted rounded-xl flex gap-3 items-start">
<img alt="Info" class="w-5 h-5 mt-0.5 text-text-secondary" src="https://lh3.googleusercontent.com/aida/AP1WRLspEawIm94P5Zt5fB_KxMFhN8yuc8fKTwCwdCKok8BLUjvk8FwFXdUoz0WfTY4t5pWYK1jSLniYUYLX-5vyQX7KbnOJMJ7bjWksoNxleEb0Gi7QEVyEEUg9b6s_9Y4NeFmYJaE3-cjflQdXoND5vrKwwBJdQ7-hWB0cJPhPknMZcjXH7vhXKSP_0gJ3-xaQwpNJLTY3w6O0u6rY-esxjEuov0zdlNhq4dG2tsLd4bzvlJq_mcxLtzZuaMM"/>
<p class="text-body-sm font-body-sm text-text-secondary leading-relaxed">
        This platform uses AI for preliminary guidance. AI-generated insights may be inaccurate; always verify with clinical documentation.
    </p>
</div></div>
<!-- Security Badge -->
<div class="mt-8 flex items-center justify-center gap-2 text-text-secondary opacity-60">
<i class="w-4 h-4" data-lucide="shield-check"></i>
<span class="font-label-caps text-label-caps">HIPAA COMPLIANT SECURE LOGIN</span>
</div>

  lucide.createIcons();
